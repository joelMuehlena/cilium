---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: ciliumqospolicies.cilium.io
spec:
  group: cilium.io
  names:
    categories:
    - cilium
    kind: CiliumQoSPolicy
    listKind: CiliumQoSPolicyList
    plural: ciliumqospolicies
    shortNames:
    - cqosp
    - ciliumqosp
    singular: ciliumqospolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.matchedEndpoints
      name: Endpoints
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v2alpha1
    schema:
      openAPIV3Schema:
        description: |-
          CiliumQoSPolicy defines QOS rules which should be
          applied to a pods egress traffic
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              dscp:
                description: |-
                  A DSCP QoS handler which defines the fields which
                  are required for dscp.
                properties:
                  value:
                    description: Value is the 6-bit DSCP codepoint (0-63).
                    maximum: 63
                    minimum: 0
                    type: integer
                required:
                - value
                type: object
              podSelector:
                description: |-
                  Selector to decide on which pods the
                  policy is going to be applied. To furhter
                  restirct the policy use the `to` field.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          enum:
                          - In
                          - NotIn
                          - Exists
                          - DoesNotExist
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      description: MatchLabelsValue represents the value from the
                        MatchLabels {key,value} pair.
                      maxLength: 63
                      pattern: ^(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])?$
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              to:
                description: |-
                  Restricts the policy to specific IP and Port
                  based destinations. So one pod could create
                  different dscp marks for different destinations.
                properties:
                  destinationCIDRs:
                    description: |-
                      Supports both IPv4 and IPv6 CIDRs. If omitted, all
                      world-bound traffic from matching pods is marked. With
                      the value of the corresponding QoS method.
                    items:
                      description: QoSToCIDR is an IP CIDR.
                      format: cidr
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  destinationPorts:
                    description: |-
                      DestinationPorts restricts marking to specific L4 destination ports.
                      Applies to both TCP and UDP. If empty, any port matches.
                      Maximum 16 ports per rule.
                    items:
                      maximum: 65535
                      minimum: 1
                      type: integer
                    maxItems: 16
                    type: array
                    x-kubernetes-list-type: set
                type: object
            required:
            - podSelector
            type: object
          status:
            properties:
              matchedEndpoints:
                description: |-
                  MatchedEndpoints is the number of local endpoints currently programmed
                  with this policy's BPF rules.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
